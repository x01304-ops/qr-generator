<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .container {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 1rem;
      resize: none;
      min-height: 80px;
      transition: border 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .col {
      flex: 1;
    }

    input[type="color"] {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0f0f1a;
      padding: 4px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #667eea;
    }

    .range-val {
      text-align: right;
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    .logo-upload {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border 0.2s;
      position: relative;
    }

    .logo-upload:hover {
      border-color: #667eea;
    }

    .logo-upload input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      cursor: pointer;
    }

    .logo-upload span {
      font-size: 0.85rem;
      color: #888;
    }

    #logoPreview {
      display: none;
      width: 64px;
      height: 64px;
      margin: 10px auto 0;
      border-radius: 8px;
      object-fit: contain;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: #333;
      color: #e0e0e0;
      margin-top: 10px;
    }

    #qrcode {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #333;
    }

    #qrcode canvas {
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.2);
    }

    .download-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .download-btns .btn {
      flex: 1;
      padding: 10px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>QR Code Generator</h1>
  <p class="subtitle">美觀、永久有效、免費</p>

  <div class="container">
    <div class="input-group">
      <label>內容（文字或網址）</label>
      <textarea id="content" placeholder="輸入文字或網址...">https://example.com</textarea>
    </div>

    <div class="row">
      <div class="col">
        <label>前景顏色</label>
        <input type="color" id="fgColor" value="#000000">
      </div>
      <div class="col">
        <label>背景顏色</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
    </div>

    <div class="input-group">
      <label>圓角程度</label>
      <input type="range" id="margin" min="0" max="4" step="1" value="2">
      <div class="range-val" id="marginVal">2（中等）</div>
    </div>

    <div class="input-group">
      <label>大小（px）</label>
      <input type="range" id="size" min="150" max="500" step="10" value="280">
      <div class="range-val" id="sizeVal">280px</div>
    </div>

    <div class="input-group">
      <label>中間 Logo（可選）</label>
      <div class="logo-upload">
        <input type="file" id="logoInput" accept="image/*">
        <span>點擊上傳圖片（建議 200x200 以內）</span>
        <img id="logoPreview" alt="logo preview">
      </div>
    </div>

    <button class="btn btn-primary" id="generateBtn">生成 QR Code</button>

    <div id="qrcode">
      <canvas id="canvas"></canvas>
      <div class="download-btns">
        <button class="btn btn-secondary" id="downloadPng">下載 PNG</button>
        <button class="btn btn-secondary" id="downloadSvg">下載 SVG</button>
      </div>
    </div>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const fgColorEl = document.getElementById('fgColor');
    const bgColorEl = document.getElementById('bgColor');
    const marginEl = document.getElementById('margin');
    const marginValEl = document.getElementById('marginVal');
    const sizeEl = document.getElementById('size');
    const sizeValEl = document.getElementById('sizeVal');
    const logoInput = document.getElementById('logoInput');
    const logoPreview = document.getElementById('logoPreview');
    const generateBtn = document.getElementById('generateBtn');
    const qrcodeEl = document.getElementById('qrcode');
    const canvas = document.getElementById('canvas');

    let logoDataUrl = null;

    // Range display
    marginEl.addEventListener('input', () => {
      const v = marginEl.value;
      const labels = ['無', '輕微', '中等', '圓潤', '極圓'];
      marginValEl.textContent = `${v}（${labels[v]}）`;
    });

    sizeEl.addEventListener('input', () => {
      sizeValEl.textContent = `${sizeEl.value}px`;
    });

    // Logo upload
    logoInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        logoDataUrl = ev.target.result;
        logoPreview.src = logoDataUrl;
        logoPreview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Generate QR
    function generate() {
      const content = contentEl.value.trim();
      if (!content) {
        alert('請輸入內容');
        return;
      }

      const size = parseInt(sizeEl.value);
      const margin = parseInt(marginEl.value);
      const fg = fgColorEl.value;
      const bg = bgColorEl.value;

      const dots = document.querySelector('#dotsOption') ? document.querySelector('#dotsOption').value : 'square';

      QRCode.toCanvas(canvas, content, {
        width: size,
        margin: margin,
        color: {
          dark: fg,
          light: bg
        }
      }, (err) => {
        if (err) {
          console.error(err);
          alert('生成失敗：' + err.message);
          return;
        }

        // Draw logo if exists
        if (logoDataUrl) {
          const ctx = canvas.getContext('2d');
          const img = new Image();
          img.onload = () => {
            const logoSize = size * 0.2;
            const x = (canvas.width - logoSize) / 2;
            const y = (canvas.height - logoSize) / 2;
            // White background
            ctx.fillStyle = bg;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, logoSize/2 + 4, 0, Math.PI * 2);
            ctx.fill();
            // Logo
            ctx.drawImage(img, x, y, logoSize, logoSize);
            qrcodeEl.style.display = 'flex';
          };
          img.src = logoDataUrl;
        } else {
          qrcodeEl.style.display = 'flex';
        }
      });
    }

    generateBtn.addEventListener('click', generate);

    // Download PNG
    document.getElementById('downloadPng').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Download SVG
    document.getElementById('downloadSvg').addEventListener('click', () => {
      const content = contentEl.value.trim();
      QRCode.toString(content, { type: 'svg' }).then(svg => {
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const link = document.createElement('a');
        link.download = 'qrcode.svg';
        link.href = URL.createObjectURL(blob);
        link.click();
      });
    });

    // Auto-generate on load
    generate();
  </script>
</body>
</html>
