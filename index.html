<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .container {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f0f1a;
      color: #e0e0e0;
      font-size: 1rem;
      resize: none;
      min-height: 80px;
      transition: border 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .col {
      flex: 1;
    }

    input[type="color"] {
      width: 100%;
      height: 42px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0f0f1a;
      padding: 4px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #667eea;
    }

    .range-val {
      text-align: right;
      font-size: 0.8rem;
      color: #888;
      margin-top: 4px;
    }

    .logo-upload {
      border: 2px dashed #333;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border 0.2s;
      position: relative;
    }

    .logo-upload:hover {
      border-color: #667eea;
    }

    .logo-upload input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      cursor: pointer;
    }

    .logo-upload span {
      font-size: 0.85rem;
      color: #888;
    }

    #logoPreview {
      display: none;
      width: 64px;
      height: 64px;
      margin: 10px auto 0;
      border-radius: 8px;
      object-fit: contain;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: #333;
      color: #e0e0e0;
      margin-top: 10px;
    }

    #qrcode {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #333;
    }

    #qrcodeCanvas {
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.2);
    }

    .download-btns {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .download-btns .btn {
      flex: 1;
      padding: 10px;
      font-size: 0.85rem;
    }

    .shape-select {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .shape-option {
      flex: 1;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0f0f1a;
      color: #888;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .shape-option.active {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
      color: #667eea;
    }
  </style>
</head>
<body>
  <h1>QR Code Generator</h1>
  <p class="subtitle">美觀、永久有效、免費</p>

  <div class="container">
    <div class="input-group">
      <label>內容（文字或網址）</label>
      <textarea id="content" placeholder="輸入文字或網址...">https://example.com</textarea>
    </div>

    <div class="row">
      <div class="col">
        <label>前景顏色</label>
        <input type="color" id="fgColor" value="#000000">
      </div>
      <div class="col">
        <label>背景顏色</label>
        <input type="color" id="bgColor" value="#ffffff">
      </div>
    </div>

    <div class="input-group">
      <label>QR Code 形狀</label>
      <div class="shape-select">
        <button class="shape-option active" data-shape="square">方塊</button>
        <button class="shape-option" data-shape="dot">圓點</button>
        <button class="shape-option" data-shape="rounded">圓角</button>
      </div>
    </div>

    <div class="input-group">
      <label>圓角程度</label>
      <input type="range" id="margin" min="0" max="4" step="1" value="2">
      <div class="range-val" id="marginVal">2（中等）</div>
    </div>

    <div class="input-group">
      <label>大小（px）</label>
      <input type="range" id="size" min="150" max="500" step="10" value="280">
      <div class="range-val" id="sizeVal">280px</div>
    </div>

    <div class="input-group">
      <label>中間 Logo（可選）</label>
      <div class="logo-upload">
        <input type="file" id="logoInput" accept="image/*">
        <span>點擊上傳圖片（建議 200x200 以內）</span>
        <img id="logoPreview" alt="logo preview">
      </div>
    </div>

    <button class="btn btn-primary" id="generateBtn">生成 QR Code</button>

    <div id="qrcode">
      <div id="qrcodeCanvas"></div>
      <div class="download-btns">
        <button class="btn btn-secondary" id="downloadPng">下載 PNG</button>
        <button class="btn btn-secondary" id="downloadSvg">下載 SVG</button>
      </div>
    </div>
  </div>

  <script>
    let qrCode = null;
    let currentShape = 'square';
    let logoDataUrl = null;

    // Range display
    document.getElementById('margin').addEventListener('input', (e) => {
      const v = e.target.value;
      const labels = ['無', '輕微', '中等', '圓潤', '極圓'];
      document.getElementById('marginVal').textContent = v + '（' + labels[v] + '）';
    });

    document.getElementById('size').addEventListener('input', (e) => {
      document.getElementById('sizeVal').textContent = e.target.value + 'px';
    });

    // Shape select
    document.querySelectorAll('.shape-option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.shape-option').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentShape = btn.dataset.shape;
      });
    });

    // Logo upload
    document.getElementById('logoInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        logoDataUrl = ev.target.result;
        const preview = document.getElementById('logoPreview');
        preview.src = logoDataUrl;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Generate QR
    function generate() {
      const content = document.getElementById('content').value.trim();
      if (!content) {
        alert('請輸入內容');
        return;
      }

      const size = parseInt(document.getElementById('size').value);
      const margin = parseInt(document.getElementById('margin').value);
      const fg = document.getElementById('fgColor').value;
      const bg = document.getElementById('bgColor').value;

      const dotsOptions = {
        square: { type: 'square' },
        dot: { type: 'dots' },
        rounded: { type: 'rounded' }
      };

      const cornersOptions = {
        square: { type: 'square' },
        dot: { type: 'dot' },
        rounded: { type: 'rounded' }
      };

      const options = {
        width: size,
        height: size,
        data: content,
        margin: margin * 10,
        dotsOptions: dotsOptions[currentShape],
        cornersOptions: cornersOptions[currentShape],
        backgroundOptions: { color: bg },
        qrOptions: { errorCorrectionLevel: 'H' }
      };

      if (logoDataUrl) {
        options.image = logoDataUrl;
        options.imageOptions = {
          crossOrigin: 'anonymous',
          margin: 8,
          imageSize: 0.25
        };
      }

      if (qrCode) {
        qrCode.update(options);
      } else {
        qrCode = new QRCodeStyling(options);
        qrCode.append(document.getElementById('qrcodeCanvas'));
      }

      qrCode.update(options);
      document.getElementById('qrcode').style.display = 'flex';
    }

    document.getElementById('generateBtn').addEventListener('click', generate);

    // Download
    document.getElementById('downloadPng').addEventListener('click', () => {
      qrCode.getRawData('png').then(blob => {
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = URL.createObjectURL(blob);
        link.click();
      });
    });

    document.getElementById('downloadSvg').addEventListener('click', () => {
      qrCode.getRawData('svg').then(blob => {
        const link = document.createElement('a');
        link.download = 'qrcode.svg';
        link.href = URL.createObjectURL(blob);
        link.click();
      });
    });

    // Initial generate
    generate();
  </script>
</body>
</html>
